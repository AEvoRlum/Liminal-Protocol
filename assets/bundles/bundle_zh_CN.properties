#炮
block.lp-orderecho.name = [#FF6464]秩序残响
block.lp-cloudpiercer.name = 穿云
block.lp-cloudpiercer.description = [red][蓄能炮]\n[gray]射程极远，蓄能一段时间后开火，擅长对付大量低级目标，但相应的，造价与消耗略高\n[green]穿云在面对低级目标能表现出优越的性能，面对较高级携带护盾目标时，破盾能力也不逊色于其他炮塔
block.lp-cloudpiercer.details = [集成库]：你知道蓄能原件和储能原件有多难研究吗？！\n[集成库]：快夸夸我！\n这座炮塔的灵感来自异世界，你知道吗？
block.lp-lucenser.name = 溯光
block.lp-lucenser.description = [red][穿甲炮]\n[gray]较同级射程略远，发射的子弹能够无视目标一定量的护甲，更加擅长面对高护甲的低级目标\n[green]溯光在面对高护甲的低级目标时，对比其他炮塔能打出独属于她的优势
block.lp-lucenser.details = [集成库]：嗯，为什么叫这个名字\n[集成库]：因为它的子弹轨迹像光一样！AwA\n[red][愿景][gray]：……
block.lp-disflux.name = 扰流
block.lp-disflux.description = [red][干扰炮]\n[gray]较同级射程略近，发射最多打击2个目标的闪电链，面对高护甲的目标难以造成伤害，但能造成EMP和对目标电网进行范围减速\n[green]扰流擅长摧毁目标护盾，主要能对目标进行干扰、对目标电网减速
block.lp-disflux.details = [集成库]：要做成不消耗电力真的很难！
block.lp-impactor.name = 冲击
block.lp-impactor.description = [red][重弹炮]\n[gray]射程略远，发射的子弹能造成击退、无视目标一定量护甲且面对护盾时造成更高伤害，擅长应对精英目标及精英以下的目标\n[green]冲击擅长摧毁目标的猛烈进攻，不论面对高、低级目标，火力也不逊色其他同级炮塔
block.lp-repulstar.name = 斥星
block.lp-repulstar.description = [red][重弹炮]\n[gray]较同级射程略近，发射的子弹能造成强力的范围击退，但伤害偏低\n[green]斥星擅长击退大量小型单位的进攻，持续为其他远程炮塔提供输出窗口
block.lp-repulstar.details = 这座炮塔的灵感来自异世界，你知道吗？
block.lp-radiance.name = 辉光
block.lp-radiance.description = [red][干扰炮]\n[gray]较同级射程略远，仅打击地面目标，发射的子弹能造成溅射伤，同时使目标[#737373]停顿[green]\n辉光擅长利用溅射伤和[#737373]停顿[green]逐步摧毁集中的大量目标，其次，也能为其他炮塔提供输出时间
block.lp-radiance.details = 这座炮塔的灵感来自异世界，你知道吗？
block.lp-meteor.name = 坠星
block.lp-meteor.description = [red][抛射炮]\n[gray]较同级射程较远，仅打击空中目标，一次发射3枚子弹\n使用[#FFB570]蚀晶[gray]作为弹药时能使目标陷入[#9F54E4]EMP II[gray]，且命中点能对地面目标造成略微伤害\n[green]坠星擅长面对空中单位，与偏辅助类炮塔能更好地应对目标空中单位的突袭
block.lp-crimsondwarf.name = 红日
block.lp-crimsondwarf.description = [red][蓄能炮]\n[gray]较同级射程略近，蓄能一段时间后发射“聚能弹”，“聚能弹”移动时会持续放射闪电，命中时造成高额能量伤及溅射伤\n[green]红日擅长应对高额护盾单位及抗伤能力较低的单位群，因需蓄能原因，与减速类炮塔能更好的对目标进行输出
block.lp-crimsondwarf.details = [集成库]：红日当头~……\n[集成库]：POOM~≥w≤
block.lp-fallenstar.name = 陨星
block.lp-fallenstar.description = [red][抛射炮]\n[gray]较同级射程略远，炮体自带光线屏蔽，不易被选中作为目标，仅打击空中目标，一次发射12枚“游弋弹”，且“游弋弹”能够无视护盾直接命中目标\n[green]陨星擅长面对空中携带护盾单位，能一次性造成大量穿甲伤害
block.lp-infernoblade.name = 刃狱
block.lp-infernoblade.description = [red][激光炮]\n[gray]较同级射程极近，仅打击地面目标，通过消耗大量电能“喷射”大量“日冕”离子，“熔化”目标\n[green]刃狱擅长快速抹去面前的大量目标，当面对携带护盾的目标能，快速“熔化”目标的护盾
block.lp-infernoblade.details = 未声张的怒火……
block.lp-recursion.name = 递归
block.lp-recursion.description = [red][动能炮]\n[gray]较同级射程较远，消耗大量电能驱动，用热量让弹药在一瞬间获得更大的初速，以造成高额的伤害，迅速摧毁并穿透目标，每穿透一个目标威力将会受到衰减\n[green]递归擅长远距离打击，优先选择范围内最高级的目标进行打击，能一次穿透多个目标，虽能穿透护盾，但造成的伤害会大幅下降
block.lp-hushstrike.name = 寂静
block.lp-hushstrike.description = [red][干扰炮]\n[gray]较同级射程略远，依赖电能驱动，发射“伪电磁脉冲”聚能弹，命中目标时放射穿透性电弧子弹，同时会在目标的一定范围内弹射侵扰性电弧，并使目标受到[#9F54E4]EMP II\n[green]寂静擅长以略远距离打击目标，若目标携带护盾，则能使其快速破盾，并为己方创造输出空窗，若目标移速较快，则能使其大幅减速，为己方创造输出空窗
block.lp-hushstrike.details = 寂静之声\n磁暴发生器\n一级磁暴发生器，能使周围敌人的技能武器无法使用\n\n[集成库]：?w?
block.lp-repelback.name = 阻击
block.lp-repelback.description = [red][重弹炮]\n[gray]较同级射程较近，使用电量及热量共同驱动，以较高速向目标发射“重激光束”震撼弹，命中时造成较高额击退和溅射伤，但其破甲能力略显不堪\n[green]阻击擅长以炮塔群的方式打击移速较快且体积较小的目标，以其优秀的击退能力，为己方创造输出空窗，面对制动能力较差的目标能造成更强的影响
block.lp-repelback.details = 长鸣\n多重激光弹\n公理会随世情变迁发展出新的意义，骑士要避免迷失于追求绝对正义\n\n[集成库]：？？？ ?w?

#运输
block.lp-jyn-duct.name = 精钢物品管道
block.lp-jyn-duct.description = [gray]以极其低廉的材料构建出的管道\n[green]快速运输物品
block.lp-jyn-ductbridge.name = 精钢物品管道桥
block.lp-jyn-ductbridge.description = [gray]能够储存少量物品并快速运输物品\n[green]能够跨越地形或建筑运输物品
block.lp-jyn-overflow.name = 溢流门
block.lp-jyn-overflow.description = [gray]当前方被堵塞时才会向两侧输出\n[green]用于处理多余物品
block.lp-jyn-underflow.name = 反向溢流门
block.lp-jyn-underflow.description = [gray]与溢流门相反，当两侧被堵塞时才会向前方输出\n[green]用于处理多余物品
block.lp-jyn-unloader.name = 装卸器
block.lp-jyn-unloader.description = [gray]快速在四面的建筑物之间装卸物品，若未使用传送带指明运输目标，则会使被装卸的建筑物内的物品数量趋向相等\n[green]自动把建筑物的物品装卸进其他建筑物
block.lp-mas-conduit.name = 重钢流体管道
block.lp-mas-conduit.description = [gray]使用耐高温的重质钢构建而成\n[green]快速运输流体
block.lp-mas-liquid-junction.name = 重钢流体交叉器
block.lp-mas-liquid-junction.description = [green]使两条流体管道交叉而不混流
block.lp-mas-liquid-junction.details = [集成库]：哎？这里怎么只有作用没有描述
block.lp-mas-liquid-router.name = 重钢流体路由器
block.lp-mas-liquid-router.description = [green]向四周的建筑物运输流体
block.lp-mas-liquid-router.details = [集成库]：哎？这里怎么只有作用没有描述
block.lp-mas-heat-redirector.name = 重钢热量传输器
block.lp-mas-heat-redirector.description = [gray]使用耐高温的重质钢作为导体\n[green]向朝向建筑传输热量
block.lp-mas-heat-router.name = 重钢热量路由器
block.lp-mas-heat-router.description = [gray]能够向除了输入面的三个方向传输热量，热量会向三个输出面平分\n[green]向输入面外三个方向的建筑传输热量
block.lp-mas-heat-redirector-small.name = 小型重钢热量传输器
block.lp-mas-heat-redirector-small.description = [gray]更小的热量传输器，让较为刁钻的位置也能传输热量\n[green]向朝向建筑传输热量
block.lp-mas-heat-router-small.name = 小型重钢热量路由器
block.lp-mas-heat-router-small.description = [gray]更小的热量路由器，热量会向三个输出面平分\n[green]向输入面外三个方向的建筑传输热量
block.lp-mas-liquid-bridge-conduit.name = 重钢流体管道桥
block.lp-mas-liquid-bridge-conduit.description = [gray]使用耐高温的重质钢作为材料，以运输高温流体\n[green]能够跨越地形或建筑运输流体
block.lp-jyn-sorter.name = 分类器
block.lp-jyn-sorter.description = [gray]如果物品与所选物品相同，则允许其通过，否则，物品将向两侧输出\n[green]分类物品
block.lp-jyn-inverted-sorter.name = 反向分类器
block.lp-jyn-inverted-sorter.description = [gray]与分类器相反，向两侧输出所选物品\n[green]分类物品
block.lp-lit-conveyor.name = 嵌轻钢传送带
block.lp-lit-conveyor.description = [gray]以低廉但轻便好用的材料构建出的传送带\n[green]快速运输物品
block.lp-lit-junction.name = 嵌轻钢交叉器
block.lp-lit-junction.description = [gray]两条传送带交叉的桥梁\n[green]使交叉的两条传送带不串联或堵塞
block.lp-lit-bridge-conveyor.name = 嵌轻钢传送带桥
block.lp-lit-bridge-conveyor.description = [gray]能够储存、缓存物品，以略慢的速度运输物品\n[green]跨越地形或建筑运输物品
block.lp-lit-unloader.name = 嵌轻钢装卸器
block.lp-lit-unloader.description = [gray]使用晶质作为处理元件，快速向四面的建筑装卸物品\n[green]快速把物品装卸进四面的建筑
block.lp-lit-unloader.details = [集成库]：这是首次将晶质作为电子元件并能发挥性能RwR
block.lp-tra-conduit.name = 转质钢流体管道
block.lp-tra-conduit.description = [gray]使用转质嵌合钢构建而成，额外使用晶质来调控流体，不直接接受侧面输入，流体不会溢出管道\n[green]快速运输流体，且流体不会溢出管道
block.lp-tra-bridge-conduit.name = 转质钢流体桥
block.lp-tra-bridge-conduit.description = [gray]使用转质嵌合钢构建而成，在原架构上添加了晶质来快速调节流体\n[green]消耗少量电力，能够跨越地形或建筑快速运输流体

#储存
block.lp-jyn-vault.name = 精钢仓库
block.lp-jyn-vault.description = [gray]使用精钢作为构建主体，蚀晶]作为物品管理器\n[green]能够储存物品
block.lp-jyn-battery.name = 精钢电池
block.lp-jyn-battery.description = [gray]使用精钢作为外壳，蚀晶作为电池管理单元，晶质作为储电单元\n[green]能够储存大量电力\n[red]被摧毁时可能会发生连锁爆炸！
block.lp-jyn-vault-large.name = 大型精钢仓库
block.lp-jyn-vault-large.description = [gray]使用精钢作为构建主体，晶质及物管芯片共同作为物品管理器，一定程度上”扩展“了储存空间\n[green]能够储存大量物品

#流体
block.lp-massisteel-liquid-storage.name = 重钢流体容仓
block.lp-massisteel-liquid-storage.description = [gray]使用耐高温的重质钢作为部分外壳与内壁，耐热性较好的精钢作为部分外壳\n[green]能够储存流体
block.lp-massisteel-liquid-storage-large.name = 大型重钢流体容仓
block.lp-massisteel-liquid-storage-large.description = [gray]使用更多的重质钢与精钢作为材料\n[green]储存大量流体
block.lp-mas-pump.name = 重钢泵
block.lp-mas-pump.description = [gray]使用耐高温的重质钢作为核心部件，精钢作为外壳，使用机械传动，以较慢速度泵送流体\n[green]泵送流体
block.lp-mas-pump-high-speed.name = 高速重钢泵
block.lp-mas-pump-high-speed.description = [gray]继承重钢泵的设计，改为电驱并扩大，外壳改为重质钢制成，其余核心部件及夹层设计不变\n[green]消耗电力以较高速度泵送流体

#钻头
block.lp-jyn-drill.name = 精钢钻头
block.lp-jyn-drill.description = [gray]不直接消耗能量，能够采集略硬的矿物，效率略高，相应的造价也高\n[green]无需供给能量，以较高效率采集矿物
block.lp-jyn-drill.details = [集成库]：你知道吗，这个钻头的原型其实来自我们共同的家乡噢~\n[red][愿景][gray]：那……我们来自哪？\n[集成库]：嗯……\n[集成库]：这个问题我暂时不能回答#w#
block.lp-shear-drill.name = 切削钻头
block.lp-shear-drill.description = [gray]使用切削刃一体钻头，造价略微提高，但能挖掘硬度更高的矿物，但效率略低\n[green]无需供给能量，以较中效率采集矿物
block.lp-impact-drill0.name = 冲击钻头
block.lp-impact-drill0.description = [gray]使用转质嵌合钢和精钢制成复合钻头，利用动能击碎矿物以获取矿产\n[green]消耗电力，以较高效率采集矿物

#电力
block.lp-jyn-power-node.name = 精钢电力节点
block.lp-jyn-power-node.description = [gray]使用蚀晶作为电力中转，不储存电力\n[green]能够跨越地形或建筑物运输电力
block.lp-jyn-power-node-large.name = 大型精钢电力节点
block.lp-jyn-power-node-large.description = [gray]依然使用蚀晶作为电力中转，但扩大了体型与规模，且不储存电力\n[green]能够跨越地形或建筑物运输电力
block.lp-heavy-ion-chamber.name = 重离子激发室
block.lp-heavy-ion-chamber.description = [gray]使用重离子束轰击离子聚合物，产生电能与能量，因此，需要大量耐热物品与导电性较低的物品作为构建材料\n[green]消耗离子聚合物产生大量电力
block.lp-annihilation-reactor.name = 湮灭反应堆
block.lp-annihilation-reactor.description = [gray]触发微矩阵约束场约束等离子体，使其在极高温高压下引力压溃，聚变离子体坍缩至”重联临界态“并释放大量高能中粒——生成“湮灭核心”。核心在聚变余烬中持续释放巨量热能与冲击波，同时因高能等离子体湍流诱发震动、能量冲击。反应室壁由固化涤光体构建，可有效削弱核心逸散的湮灭波，但在持续辐照及极高温高压下将缓慢湮灭消解。湮灭核心生命周期结束后，反应堆将重新生成“湮灭核心”并循环上述过程。为持续运行，需保证堆内材料及结构稳定性，因而需求异氢循环降温、持续替换已损毁材料\n[green]消耗大量电力、异氢，稳定产出大量电力，伴随持续结构损伤与不可预测的能量灾害
block.lp-tra-power-node.name = 转质钢电力节点
block.lp-tra-power-node.description = [gray]使用转质嵌合钢构建，晶质来调控及中转电力，不储存电力\n[green]能够跨越地形或建筑运输电力
block.lp-tra-power-tower.name = 转质钢电力塔
block.lp-tra-power-tower.description = [gray]使用大量转质嵌合钢构建，晶质来调控及中转电力，经特殊处理后能够依靠建筑相贴传导电力，不储存电力\n[green]能够跨越地形或建筑运输电力

#工厂
block.lp-mas-slag-heater.name = 重钢矿渣制热厂
block.lp-mas-slag-heater.description = [gray]使用重质钢储存矿渣与导热，蚀晶控制热量避免熔毁\n[green]消耗矿渣加热朝向建筑
block.lp-ionopolymer-crucible.name = 离子聚合坩埚
block.lp-ionopolymer-crucible.description = [gray]由大量耐热材料制成，使用复合材料组成聚合物，接着使用等离子激发聚合物，然后立即封装进能量栓，以此制成离子聚合物\n[green]消耗热量、精钢、蚀晶、重质钢，以较低效率生产离子聚合物
block.lp-erocrys-extractory.name = 蚀晶析质厂
block.lp-erocrys-extractory.description = [gray]使用大量耐热材料和电路材料构成一整套耐热且精密的工厂，用高温使蚀晶进入不稳定的“沸腾”状态，接着使用强电解发生还原反应并诱导其析出晶质原物，最后经过熔融、提炼后制成晶质\n[green]消耗热量、电量与蚀晶，以中等效率生产晶质
block.lp-trans-chimeric-foundry.name = 转构嵌合冶金厂
block.lp-trans-chimeric-foundry.description = [gray]由大量材料构成，使用极其高的温度让材料熔为“原钢”，再加以强电离，使“原钢”的晶格排列发生变化，静置一段时间后，再使用点冶金技术提取复合金属产物，即转质嵌合钢\n[green]消耗大量电量、重质钢和嵌轻钢，以较缓慢的速度生产转质嵌合钢
block.lp-ionopolymer-crucible-large.name = 大型离子聚合坩埚
block.lp-ionopolymer-crucible-large.description = [gray]由大量耐热材料构成，在原工序上拓展更多产线，并将封装方式改为高速冲压\n[green]以高效率生产离子聚合物
block.lp-ionopolymer-crucible-large.details = [集成库]：这是第一次设计大型产线AwA\n[集成库]：要庆祝庆祝吗？CwC
block.lp-high-speed-transchimeric-foundry.name = 高速转质钢冶炼厂
block.lp-high-speed-transchimeric-foundry.description = [gray]选择性继承了大型离子聚合炉的研究经验，不仅拓展了更多产线同时运作，且将生产技术进一步提升，使其消耗的电量不会成倍增长\n[green]消耗电量、重质钢和嵌轻钢，以较快的速度生产转质嵌合钢
block.lp-chip-fabricator.name = 芯片刻写机
block.lp-chip-fabricator.description = [gray]主要由精钢和转质嵌合钢构成，能够实现绝缘及富电的隔离生产环境，使用较大量晶质作为集成控制中枢以精密控制生产设备\n[green]能够生产各类一级芯片，且能在一定范围内超载运行
block.lp-power-heater.name = 电制热机
block.lp-power-heater.description = [gray]主要由转质嵌合钢构成，同时具备一定耐热性及导热性，因材料的导电性能够依靠建筑相贴传导电力，依赖电压及电阻产生热量\n[green]消耗电能产生热量并加热朝向建筑
block.lp-integrated-alloy-cmelting-curing-refinery.name = 合金熔炼固化一体精炼厂
block.lp-integrated-alloy-cmelting-curing-refinery.description = [gray]主体由转质嵌合钢及精钢构筑，集成熔炼与固化工艺于一体。将复合材料质团于超高温环境下熔融为均质合金液，随即导入固化室，经由强磁场诱导拓扑固化反应，促使合金晶格在分子层面定向重排，形成抗形变、抗辐射的稳定结构。最终产物经精炼提纯并固化成型，制得成品固化涤光体。能依靠建筑相贴传导电力\n[green]消耗大量电能、热能及多种原料，生产效率较低
block.lp-heterohydrogen-collector.name = 异氢捕集器
block.lp-heterohydrogen-collector.description = [gray]能够从稀薄的大气中捕集异氢，但因异氢的特殊性，其会自主聚集并结晶为固态异氢。能依靠建筑相贴传导电力\n[green]消耗电力，以低效率获取固态异氢
block.lp-heterohydrogen-liquefier.name = 异氢液化器
block.lp-heterohydrogen-liquefier.description = [gray]利用高压环境加以强电离，使固态异氢的共价键断裂，致使固态异氢融为异氢。能在一定程度下超载运行，能依靠建筑相贴传导电力\n[green]消耗电力，以略低效率获取异氢

#防御
block.lp-auto-build-tower.name = 自动构建塔
block.lp-auto-build-tower.description = [gray]以构建芯片及晶质驱动，会自动重新构建被摧毁的建筑且能在范围内辅助建造建筑\n[green]能够自动重建范围内被摧毁的建筑，同时也能辅助建造建筑

#墙
block.lp-jyn-wall.name = 精钢墙
block.lp-jyn-wall.description = [gray]能够阻挡子弹与部分单位，用于单位构造或防御工事\n[green]有小概率能够弹开子弹，被弹开的子弹能够对敌方单位造成伤害
block.lp-jyn-wall-large.name = 大型精钢墙
block.lp-jyn-wall-large.description = [gray]能够阻挡子弹与部分单位，用于单位构造或防御工事\n[green]有小概率能够弹开子弹，被弹开的子弹能够对敌方单位造成伤害
block.lp-mas-wall.name = 重钢墙
block.lp-mas-wall.description = [gray]能够阻挡子弹及部分单位\n[green]用于单位构造或防御工事
block.lp-mas-wall-large.name = 大型重钢墙
block.lp-mas-wall-large.description = [gray]能够阻挡子弹及部分单位\n[green]用于单位构造或防御工事
block.lp-tra-wall.name = 转质钢墙
block.lp-tra-wall.description  = [gray]能阻挡子弹及部分单位，因材料构成，受到的碾压伤害小幅降低\n[green]用于单位构造或防御工事
block.lp-tra-wall-large.name = 大型转质钢墙
block.lp-tra-wall-large.description = [gray]能阻挡子弹及部分单位，因材料构成，受到的碾压伤害降低\n[green]用于单位构造或防御工事

#核心
block.lp-pioneers.name = 拓荒者
block.lp-pioneers.description = [red][核心]\n[gray]抵达目的地后，集成库自主研发的核心\n[green]具备较好的外壳与良好的储物空间

#单位
unit.lp-pioneers-unit.name = 拓荒者
unit.lp-pioneers-unit.description = [gray]抵达目的地后，集成库自主研发的核心机，能够修复建筑，较高效挖掘矿物\n\n[orange]#高速修复端口\n[修复炮]以较快的速度修复建筑\n\n[green]无法被敌方锁定，但会受到伤害
unit.lp-riptide.name = 涌流
unit.lp-riptide.description = [#FFBF6D][AR]\n[gray]移速较快，能在液面上飞行而不沉，但仍会被高墙或建筑阻挡，拥有轻装甲\n\n[orange]#微能制导炮：\n[gray]射程较近，发射两枚追踪子弹，子弹面对护甲较高的目标较为乏力，但面对护盾能打出跟高的伤害\n\n[accent]涌流单体行动时难以造成威胁，但数量增加时能够产生不小的威胁（废话），面对涌流使更推荐使用高护甲的建筑来阻挡
unit.lp-riptide-spawn.name = 涌流
unit.lp-corroded-order.name = 旧蚀序
unit.lp-corroded-order.description = [#FFBF6D][RI]\n[red][悬浮单位，堡垒，攻击，修复，压制]\n[lightgray]来自##时代的恨意，来自“你”曾经的记忆，它的存在仅为了消除“你”的存在\n[gray]移速较慢，无法被高墙或建筑阻挡，拥有极厚的装甲与护盾，护盾有概率能反弹子弹且能阻挡飞行单位\n\n[yellow]#弧形护盾\n[gray]能够吸收子弹且有概率反弹子弹\n\n[yellow]#能量场\n[gray]能够对目标造成伤害，对友方造成治疗\n\n[yellow]#装甲板\n[gray]瞄准时减少受到的伤害\n\n[orange]#矩力折现装置\n[red][追踪炮，特殊伤]\n[gray]能够以极快得速度命中并穿透目标，能使目标陷入[#FF6464]明灭[gray]且造成极高的伤害\n\n[orange]#矩力重矛\n[red][动能炮，穿甲伤]\n[gray]能够穿透单位，利用[#dc143cff]矩力[gray]提供的动能撕裂目标\n\n[orange]#立场单元投射装置\n[red][##炮，##伤]\n[抛射炮？，溅射伤？]\n[gray]能投射立场单元，立场单位能持续对周围目标发射“闪电链”，命中时能造成范围伤害，立场单元的每一次伤害都带有[#E5E5E5]紊乱[gray]\n\n[orange]#离子抛射装置\n[red][追踪炮，穿甲伤]\n[gray]一次发射三发子弹，命中时使目标陷入[#FF6464]明灭
unit.lp-lumineseeker.name = 旧追光者
unit.lp-lumineseeker.description = [#FFBF6D][RI]\n[red][“爬行”机甲单位，堡垒，攻击，阻击，修复]\n[lightgray]绝对理性的机械不会理解何为恐惧\n移速较慢，无法被建筑阻挡，拥有极其厚重的装甲\n\n[orange]#数据链式重组\n[red][修复炮]\n[gray]能高速修复范围内的单一目标\n\n[orange]#数组推演调取\n[red][追踪炮，能量伤]\n[gray]能够一次发射多枚子弹，子弹能使目标陷入[#E5E5E5]紊乱\n\n[orange]#重离子反冲\n[red][蓄能炮，溅射伤]\n[gray]蓄能时无法进行其他武器开火，子弹会以极快的速度命中目标，造成高额伤害的同时能使目标附近的电网减速\n\n[orange]#数据崩解\n[red][追踪炮，溅射伤，能量伤]\n[gray]一次发射两枚子弹，命中时会不断向周围发射“熔断点”和闪电，以持续造成伤害，持续一段时间后造成溅射伤害
unit.lp-rusher.name = 奔袭
unit.lp-rusher.description = [#FFBF6D][AR]\n[lightgray]不停的奔向死亡，不停的向死亡索取\n移速较快，无法被高墙或建筑阻挡，每次攻击时获得[#FFFFFF]索取[lightgray]效果，拥有较轻装甲\n\n[orange]#离子物投放仓\n[gray]一次发射多枚子弹，延迟一段时间后造成溅射伤\n\n[accent]奔袭会主动向工厂类建筑飞行并轰炸，且移速快\n需在其路径中建造击退或减速或专门应对飞行单位的炮塔
unit.lp-rusher-spawn.name = 奔袭
unit.lp-crystalburst.name = 晶裂
unit.lp-crystalburst.description = [#FFBF6D][AR]\n[lightgray]以自身为武器，撕开“死亡”的防线\n移速较快，无法被建筑阻挡，死亡时发生小范围爆炸\n\n[orange]#静滞裂痕\n[gray]子弹飞行较为缓慢，能够造成较高的伤害，命中护盾时威力大幅衰减\n\n[orange]#晶格惩戒\n[gray]死亡时“开火”，对范围内造成较高额伤害，命中护盾时威力大幅衰减\n\n[accent]晶裂会主动向炮塔行进，移速较快，血量较低，死亡时造成小范围爆炸\n需在防线布设能够击退或减速或单次伤害较高的炮塔以应对该目标
unit.lp-crystalburst-spawn.name = 晶裂
unit.lp-ravager.name = 毁坏
unit.lp-ravager.description = [#FFBF6D][TH]\n[lightgray]永不动摇，绝不退缩，从不怜悯\n移速较慢，无法被建筑阻挡，本身防御能力较弱，但其携带大型棱形护盾\n\n[yellow]#噬能立场\n[gray]能够吸收子弹且随时间恢复护盾值，过载时需时间冷却\n\n[orange]#活性崩坍\n[gray]快速抛射高能子弹，命中时对目标造成[#9F54E4]EMP II\n\n[accent]毁坏会主动向炮塔行进，移速较慢，但威胁性较高且拥有厚重的护盾\n需在防线布设能对护盾造成大量伤害的炮塔以应对该目标
unit.lp-ravager-spawn.name = 毁坏
unit.lp-vectruptor.name = 破失
unit.lp-vectruptor.description = [#FFBF6D][TH]\n[lightgray]诡异的“能量”造物，不惜的抹除所见目标\n移速略慢，无法被高墙或建筑阻挡，较为脆弱，但拥有较高值护甲\n\n[yellow]#镜像复制\n[gray]一定时间过后复制自己\n\n[orange]#矢量放逐\n[gray]以较慢速度发射子弹，命中时造成较高额伤害\n\n[orange]#破相重铸\n[gray]死亡时“开火”，造成大范围、极高额的穿甲溅射伤\n\n[accent]破失会主动向炮塔行进，移速略慢，但其威胁性高，且死亡时会大范围“抹除”己方设施\n需在前线或路径布设能一性次造成高额伤害的炮塔，建议搭配减速类、击退类等辅助型炮塔应对该目标
unit.lp-vectruptor-spawn.name = 破失
unit.lp-sustainer.name = 维系
unit.lp-sustainer.description = [#FFBF6D][TH]\n[lightgray]吞噬思维，维系完整，晚安\n移速略慢，无法被高墙或建筑阻挡，拥有较厚的护甲，会在目标周围徘徊并攻击\n\n[yellow]#沉寂囚笼\n[gray]能够吸收子弹且以较慢的速度恢复护盾值\n\n[yellow]#“重构”\n[gray]持续向范围内的目标发射“闪电链”攻击，命中友方时治疗\n\n[orange]#湮灭轰鸣[gray]自机体下方投放的两枚“破冲弹”，延迟一定时间后造成溅射伤\n\n[orange]#边缘危机[gray]机体湮灭时造成较大范围溅射伤\n\n[accent]维系同时拥有保护、修复友方的能力，且会在目标上空持续徘徊轰炸，直至目标损毁，死亡时会造成较大范围溅射伤，集群威胁极大\n需在防线布设能够快速摧毁该目标的护盾、使目标移速减缓、输出能力较高的炮塔，以应对该目标
unit.lp-sustainer-spawn.name = 维系
unit.lp-annihicore.name = 重核
unit.lp-annihicore.description = [#FFBF6D][TH]\n[lightgray]前方是毁灭亦是重生——\n移速较慢，无法被建筑阻挡，拥有厚重的护甲\n\n[yellow]#“破翼者”\n[gray]快速向范围内3个目标进行攻击，命中友方时造成低额治疗\n\n[orange]#双极缄默\n[gray]连续发射两枚“共振弹”，能够穿透两个建筑或单位\n\n[orange]#“热寂湮灭”\n[gray]机体毁灭时产生较大范围的冲击波，冲击波仅打击地面目标且无视立场护盾，能够穿透一定数量的建筑与单位\n\n[accent]重核移速缓慢，但拥有厚重的护甲，且伤害性威胁较高\n需在防线布设能够“一次性”抹除该目标的炮塔以应对该目标
unit.lp-annihicore.details = “湮灭核能”——\n一个既熟悉又陌生的名字……
unit.lp-annihicore-spawn.name = 重核
unit.lp-rupture.name = 裂断
unit.lp-rupture.description = [#FFBF6D][TH][lightgray]一把剑将要斩断谁，剑不会知道，永远\n移速较慢，能被阻挡，拥有较轻的护甲\n\n[orange]#“裂痕”\n[gray]交替射击，同时发射激光与穿透弹，伤害和穿透能力略有不同\n\n[accent]裂断移速较慢，攻击距离与子弹穿透能力共同构成了威胁\n需在防线布设较厚的墙体，及有击退能力的炮塔以针对该目标
unit.lp-rupture-spawn.name = 裂断
unit.lp-starmeter.name = 度星
unit.lp-starmeter.description = [#FFBF6D][TH]\n[lightgray]只需度量——只需度量——只需度量……不可回头，绝不\n移速较慢，可被阻挡，拥有较为厚重的护甲\n\n[orange]#“一颗黑洞的半径”\n[gray]交替射击，发射的子弹能够穿透一定数量的建筑或单位，每命中一个建筑与单位“分裂”出四枚“振裂弹”，“振裂弹”延迟一段时间后对范围内目标造成溅射伤\n\n[accent]度星移速较慢，拥有较厚重的护甲，射程远且火力威胁较强\n需在防线布设较厚的墙体，及射程较远且输出能力足够的炮塔以应对该目标
unit.lp-starmeter-spawn.name = 度星
unit.lp-stormpole.name = 雷极
unit.lp-stormpole.description = [#FFBF6D][TH]\n[red]不要错过[lightgray]任何一丝希望，紧紧抓住“她”\n移速较快，可被阻挡，拥有较轻护甲\n\n[orange]#“悄然”\n[gray]间隔发射两枚子弹，命中时造成略大范围的溅射伤\n\n[accent]雷极移速较快，具备较轻护甲，射程略远，火力输出能力及影响较大\n需在防线布设减速类炮塔辅助输出并保护防线，以针对该目标
unit.lp-stormpole-spawn.name = 雷极
unit.lp-eradicator.name = 噬灭
unit.lp-eradicator.description = [#FFBF6D][TH]\n\n[lightgray]信念与荣耀、情感与生命终将归于晶尘\n移速极慢，无法被建筑阻挡，拥有极为厚重的护甲\n\n[yellow]#“蔑视”\n[gray]弧形护盾，随时间一较快速度恢复护盾值，有概率反弹子弹，能够阻挡空中单位\n\n[yellow]#“重视”\n[gray]为范围内的单位赋予护盾，拥有一定值的上限\n\n[orange]#“重压”\n[gray]飞行过程中不会命中其他目标，命中时造成溅射伤并产生三枚“熔断点”，能够穿透大量建筑与单位并造成略低值穿甲伤\n\n[orange]#“涤雨”\n[gray]间隔发射4次3枚“微核弹”，命中时造成直击伤\n\n[accent]依据噬灭的能力，其具备较强的防线破冲能力及推进能力，且难以被击退\n需在防线布设具备极高输出的炮塔，并搭配减速类炮塔辅助输出
unit.lp-eradicator-spawn.name = 噬灭

#物品
item.lp-jynsteel.name = [#5F6372]精钢
item.lp-jynsteel.description = [red][建筑材料]\n[gray]通体深灰色，硬度略高，韧性与延展性突出，耐热性较好，导电性极低，可作为合成钢材料、建筑材料等
item.lp-erocrys.name = [#FFB570]蚀晶
item.lp-erocrys.description = [red][芯片材料]\n[gray]通体橙色，硬度低，延展性极好，导电性良好，可作为合成材料、电路原件等
item.lp-massisteel.name = [#545F66]重质钢
item.lp-massisteel.description = [red][建筑材料]\n[gray]通体钢灰色，质地坚硬，韧性偏弱，耐热性突出，导电性微弱，可作为合成钢材料、建筑材料等
item.lp-ionopolymer.name = [#E8D174FF]离子聚合物
item.lp-ionopolymer.description = [red][消耗材料]\n[gray]由精钢封装的离子聚合物，具有一定危险性，能被重离子束激发 产生能量与电能
item.lp-crystalite.name = [#EDA76E]晶质
item.lp-crystalite.description = [red][芯片材料]\n[gray]通体橙黄色，硬度低，延展性、导电性良好，化学性质稳定，通电时体积变化小，略带有辐射，可作为电子元件、芯片或电池等
item.lp-litelnlay.name = [#E8EBFF]嵌轻钢
item.lp-litelnlay.description = [red][建筑材料]\n[gray]通体白色泛蓝，硬度低但韧性较好，延展性极好，耐热性略中，导电性、导热性良好，可作为合成钢材料、建筑材料等
item.lp-transchimericsteel.name = [#AAACB5]转质嵌合钢
item.lp-transchimericsteel.description = [red][建筑材料]\n[gray]通体灰泛深蓝，继承了重质钢的坚硬与嵌轻钢的韧性，抗冲击性得到了大幅提升，耐热性略有下降，但高温状态下形变强度仍能保持在90%，导电性大幅提升，因此无法直接作为带电、芯片设施等的外壳，可作为建筑材料等，主要应用于抗冲击需求环境
item.lp-bipolarchip.name = [#EDA76E]双极芯片
item.lp-bipolarchip.description = [red][芯片材料]\n[gray]由精钢封装的一级芯片，硬度偏低，外壳导电性极低，主要应用于炮塔特殊高供能模块
item.lp-converchip.name = [#FCF287]聚能芯片
item.lp-converchip.description = [red][芯片材料]\n[gray]由重质钢封装的一级芯片，硬度中等，外壳导电性微弱，具备一定耐热及导热性，主要应用于各类储能模块
item.lp-stockchip.name = [#FFB570]物管芯片
item.lp-stockchip.description = [red][芯片材料]\n[gray]由精钢封装的一级芯片，硬度偏低，外壳导电性极低，主要应用仓库物品管理
item.lp-photosolid-alloy.name = [#666775]固化涤光体
item.lp-photosolid-alloy.description = [red][建筑材料]\n[gray]通体暗灰色，硬度高，抗形变能力强，结构稳定，能够有效抵抗强引力场引发的结构应力，不易因极端引力环境而形变，可抵御大部分高能辐射乃至高能粒子流，适用于部分极端环境\n于一次“意外”中成功制得，主要应用于装甲于特殊能量承载体
item.lp-heterosoligen.name = [#8497B5]固态异氢
item.lp-heterosoligen.description = [red][消耗材料]\n[gray]通体亮青色，特殊的气体结晶，具有放射性及良好的导热性，不具有导电性
item.lp-buildchip.name = [#E8D174]构建芯片
item.lp-buildchip.description = [red][芯片材料]\n[gray]由精钢封装的一级芯片，硬度偏低，外壳导电性极低，主要应用建筑构建或载荷构建

